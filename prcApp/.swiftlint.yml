# SwiftLint 設定 — iOS 26 / Swift 6 / SwiftUI MV
# https://github.com/realm/SwiftLint

excluded:
  - .build
  - Pods
  - Carthage
  - DerivedData
  - "**/*.generated.swift"
  - "**/Generated"

# デフォルト無効 → opt-in
opt_in_rules:
  - array_init
  - attributes
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - convenience_type
  - discouraged_object_literal
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - explicit_init
  - fallthrough
  - fatal_error_message
  - first_where
  - flatmap_over_map_reduce
  - identical_operands
  - implicit_return
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - legacy_random
  - literal_expression_end_indentation
  - lower_acl_than_parent
  - modifier_order
  - multiline_arguments
  - multiline_function_chains
  - multiline_literal_brackets
  - multiline_parameters
  - operator_usage_whitespace
  - overridden_super_call
  - pattern_matching_keywords
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - private_action
  - private_outlet
  - prohibited_super_call
  - reduce_into
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_first_last
  - static_operator
  - strict_fileprivate
  - toggle_bool
  - trailing_closure
  - unavailable_function
  - unneeded_parentheses_in_closure_argument
  - unowned_variable_capture
  - vertical_parameter_alignment_on_call
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces
  - yoda_condition

disabled_rules:
  - todo                       # WIP の // TODO は許容
  - opening_brace              # SwiftFormat と競合
  - trailing_comma             # SwiftFormat に任せる

# カスタム閾値
line_length:
  warning: 120
  error: 160
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 500
  error: 800

type_body_length:
  warning: 300
  error: 500

function_body_length:
  warning: 50
  error: 100

cyclomatic_complexity:
  warning: 10
  error: 20

identifier_name:
  min_length: 2
  excluded:
    - id
    - x
    - y
    - z

# プロジェクト固有禁止パターン
custom_rules:
  no_observableobject:
    name: "ObservableObject 禁止"
    regex: "(ObservableObject|@Published|@StateObject|@ObservedObject|@EnvironmentObject)\\b"
    message: "iOS 17+ では @Observable マクロを使う"
    severity: error

  no_navigationview:
    name: "NavigationView 禁止"
    regex: "\\bNavigationView\\s*\\{"
    message: "NavigationStack を使う"
    severity: error

  no_dispatchqueue:
    name: "DispatchQueue 禁止"
    regex: "\\bDispatchQueue\\."
    message: "Swift Concurrency (async/await, Task) を使う"
    severity: warning

  no_print:
    name: "print 禁止"
    regex: "(?<!\\w)print\\s*\\("
    message: "os.Logger を使う"
    severity: warning
    excluded:
      - ".*Tests\\.swift"
